<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TERMINUS | SISR CAMPAIGN</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        /* --- 1. DESIGN IDENTIQUE AU PORTEFOLIO --- */
        body {
            margin: 0; padding: 0;
            background-color: #020c1b; /* Bleu nuit profond */
            color: #e0ffff; /* Cyan très pâle */
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Fond animé (Simulation) */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0a192f 0%, #020c1b 100%);
            z-index: -2;
        }
        .grid-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1;
        }

        /* --- 2. CONTENEUR TERMINAL --- */
        .terminal-container {
            width: 95%; max-width: 1200px; height: 90vh;
            background: rgba(2, 12, 27, 0.9);
            border: 1px solid #00f2ff;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
            border-radius: 8px;
            display: flex; flex-direction: column;
            padding: 20px;
            position: relative;
            backdrop-filter: blur(5px);
        }

        /* HUD (Barre du haut) */
        .hud {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #00f2ff;
            padding-bottom: 15px; margin-bottom: 15px;
            font-family: 'Orbitron', sans-serif;
            color: #00f2ff;
        }

        .hud-stats span { margin-right: 20px; }
        
        .btn-exit {
            border: 1px solid #ff0055; color: #ff0055;
            padding: 5px 15px; text-decoration: none;
            font-size: 0.8rem; transition: 0.3s;
            font-family: 'Share Tech Mono';
        }
        .btn-exit:hover { background: #ff0055; color: white; box-shadow: 0 0 15px #ff0055; }

        .btn-wiki {
            border: 1px solid #00f2ff; color: #00f2ff;
            padding: 5px 15px; text-decoration: none;
            font-size: 0.8rem; transition: 0.3s; margin-right: 10px;
            font-family: 'Share Tech Mono';
        }
        .btn-wiki:hover { background: #00f2ff; color: #020c1b; box-shadow: 0 0 15px #00f2ff; }

        /* ZONE TEXTE */
        #terminal-output {
            flex-grow: 1;
            overflow-y: auto;
            font-size: 1.1rem;
            line-height: 1.5;
            scrollbar-width: thin;
            scrollbar-color: #00f2ff #020c1b;
        }

        /* INPUT */
        .input-line {
            display: flex; align-items: center;
            margin-top: 10px;
            border-top: 1px dashed rgba(0, 242, 255, 0.3);
            padding-top: 10px;
        }
        input {
            background: transparent; border: none; color: #fff;
            font-family: 'Share Tech Mono', monospace; font-size: 1.1rem;
            width: 100%; outline: none; margin-left: 10px;
        }

        /* COULEURS SYNTAXIQUES */
        .dir { color: #00f2ff; font-weight: bold; } /* Cyan pour dossiers */
        .file { color: #ccc; }
        .success { color: #0f0; }
        .error { color: #ff0055; } /* Rouge rose pour erreurs */
        .info { color: #ffbd2e; } /* Jaune */
        .prompt-user { color: #00f2ff; }
        .prompt-root { color: #ff0055; }

    </style>
</head>
<body>
<canvas id="matrix-bg"></canvas>


    <div class="bg-overlay"></div>
    <div class="grid-overlay"></div>

    <div class="terminal-container">
        <div class="hud">
            <div class="hud-stats">
                <span><i class="bi bi-person-fill"></i> <span id="hud-user">guest</span></span>
                <span><i class="bi bi-hdd-stack"></i> LEVEL <span id="hud-level">1</span>/10</span>
            </div>
            <div>
                <a href="/wiki_terminus" target="_blank" class="btn-wiki"><i class="bi bi-book"></i> WIKI / SOLUCE</a>
                <a href="/" class="btn-exit"><i class="bi bi-x-lg"></i> QUITTER</a>
            </div>
        </div>

        <div id="terminal-output"></div>

        <div class="input-line">
            <span id="prompt-text" class="prompt-user">guest@srv:~$</span>
            <input type="text" id="cmd-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
        /* =========================================
           1. DONNÉES DU JEU (10 NIVEAUX)
           ========================================= */
        const levels = [
            { id: 1, title: "Initialisation", desc: "Trouvez et lisez le fichier 'readme.txt'.", fs: { "home": { "guest": { "readme.txt": { type: "file", content: "KEY_LVL_1" } } } }, check: (cmd, arg) => cmd === "cat" && arg === "readme.txt" },
            { id: 2, title: "Fichier Caché", desc: "Trouvez le fichier '.secret' (ls -a).", fs: { "home": { "guest": { ".secret": { type: "file", content: "KEY_LVL_2" }, "dummy.txt": {type:"file", content:"Rien"} } } }, check: (cmd, arg) => cmd === "cat" && arg === ".secret" },
            { id: 3, title: "Navigation Relative", desc: "Allez dans /var/log et lisez 'syslog'.", fs: { "home": { "guest": {} }, "var": { "log": { "syslog": { type: "file", content: "KEY_LVL_3" } } } }, check: (cmd, arg) => cmd === "cat" && arg === "syslog" },
            { id: 4, title: "Permission Root", desc: "Lisez /etc/shadow (nécessite sudo su).", fs: { "etc": { "shadow": { type: "file", content: "KEY_LVL_4", locked: true } } }, check: (cmd, arg, _, user) => cmd === "cat" && arg === "shadow" && user === "root" },
            { id: 5, title: "Nettoyage", desc: "Allez dans /tmp et supprimez 'virus.exe'.", fs: { "tmp": { "virus.exe": { type: "file" } } }, check: (cmd, arg) => cmd === "rm" && arg === "virus.exe" },
            { id: 6, title: "Création Dossier", desc: "Créez un dossier 'backup' dans /home/guest.", fs: { "home": { "guest": {} } }, check: (cmd, arg) => cmd === "mkdir" && arg === "backup" },
            { id: 7, title: "Info Réseau", desc: "Affichez votre IP.", fs: { "home": { "guest": {} } }, check: (cmd) => cmd === "ip" || cmd === "ifconfig" },
            { id: 8, title: "Grep", desc: "Trouvez 'admin' dans 'users.txt'.", fs: { "home": { "guest": { "users.txt": { type: "file", content: "root\nadmin\nguest" } } } }, check: (cmd, arg, _, __, full) => full.includes("grep") && full.includes("admin") },
            { id: 9, title: "Touch", desc: "Créez un fichier 'test.log'.", fs: { "home": { "guest": {} } }, check: (cmd, arg) => cmd === "touch" && arg === "test.log" },
            { id: 10, title: "BOSS FINAL", desc: "En tant que root, allez dans /root et supprimez 'core.sys'.", fs: { "root": { "core.sys": { type: "file", locked: true } } }, check: (cmd, arg, _, user) => cmd === "rm" && arg === "core.sys" && user === "root" }
        ];

        /* =========================================
           2. MOTEUR DU JEU
           ========================================= */
        let currentLvl = 0;
        if(localStorage.getItem('term_lvl')) currentLvl = parseInt(localStorage.getItem('term_lvl'));
        if(currentLvl >= levels.length) currentLvl = 0;

        let currentFs = {};
        let currentPath = ["home", "guest"];
        let currentUser = "guest";
        let history = []; let historyIdx = -1;
        
        // Liste des commandes pour l'autocomplétion
        const validCommands = ["ls", "cd", "cat", "pwd", "whoami", "sudo", "rm", "mkdir", "touch", "ip", "exit", "clear", "help", "grep"];

        const output = document.getElementById('terminal-output');
        const input = document.getElementById('cmd-input');
        const promptSpan = document.getElementById('prompt-text');

        // Init
        initLevel(currentLvl);

        function initLevel(idx) {
            currentLvl = idx;
            localStorage.setItem('term_lvl', idx);
            currentPath = ["home", "guest"];
            if(idx === 2) currentPath = ["home", "guest"]; 
            currentUser = "guest";
            currentFs = JSON.parse(JSON.stringify(levels[idx].fs));
            if(!currentFs["root"]) currentFs["root"] = {type: "dir", locked: true, children: {}}; 
            
            document.getElementById('hud-level').innerText = idx + 1;
            document.getElementById('hud-user').innerText = "guest";
            updatePrompt();
            
            output.innerHTML = "";
            print(`--- INITIALISATION NIVEAU ${idx + 1} ---`, "info");
            print(`OBJECTIF : ${levels[idx].title}`, "success");
            print(levels[idx].desc);
            print("<br>");
        }

        /* =========================================
           3. FONCTIONS UTILITAIRES
           ========================================= */
        function resolvePath(pathArray) {
            let pointer = currentFs;
            for (let part of pathArray) {
                if (pointer[part]) {
                    pointer = pointer[part]; 
                    if(pointer.children) pointer = pointer.children; 
                } else if (pointer.children && pointer.children[part]) {
                    pointer = pointer.children[part];
                } else {
                    return null;
                }
            }
            return pointer;
        }

        function getPathString() {
            return currentPath.length === 0 ? "/" : "/" + currentPath.join("/");
        }

        function updatePrompt() {
            const symbol = currentUser === "root" ? "#" : "$";
            promptSpan.innerText = `${currentUser}@srv:${getPathString()}${symbol}`;
            promptSpan.className = currentUser === "root" ? "prompt-root" : "prompt-user";
            document.getElementById('hud-user').innerText = currentUser;
        }

        function print(txt, type="") {
            const div = document.createElement('div');
            div.innerHTML = txt;
            if(type) div.className = type;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }

        /* =========================================
           4. GESTION CLAVIER (TAB & HISTOIRE)
           ========================================= */
        document.body.addEventListener('click', () => input.focus());

        input.addEventListener('keydown', function(e) {
            
            // --- TAB (AUTOCOMPLÉTION) ---
            if (e.key === "Tab") {
                e.preventDefault(); // Empêche de quitter le champ
                const val = input.value;
                const parts = val.split(" ");
                const lastWord = parts[parts.length - 1];

                // 1. Complétion de Commande (si on tape le 1er mot)
                if (parts.length === 1) {
                    const match = validCommands.find(c => c.startsWith(lastWord));
                    if (match) {
                        input.value = match + " ";
                    }
                } 
                // 2. Complétion de Fichier/Dossier (si on tape un argument)
                else {
                    // On cherche dans le dossier courant
                    let dirObj;
                    if(currentPath.length === 0) dirObj = currentFs;
                    else dirObj = resolvePath(currentPath);

                    // Si on a children (cas normal) ou si on est à la racine
                    let content = dirObj.children ? dirObj.children : dirObj;
                    
                    if(content) {
                        const match = Object.keys(content).find(f => f.startsWith(lastWord));
                        if (match) {
                            parts[parts.length - 1] = match;
                            input.value = parts.join(" ");
                        }
                    }
                }
            }

            // --- HISTORIQUE ---
            if(e.key === "ArrowUp" && historyIdx > 0) input.value = history[--historyIdx];
            if(e.key === "ArrowDown") {
                if(historyIdx < history.length - 1) input.value = history[++historyIdx];
                else input.value = "";
            }

            // --- ENTRÉE ---
            if(e.key === "Enter") {
                const val = input.value.trim();
                if(val) {
                    history.push(val); historyIdx = history.length;
                    print(`${promptSpan.innerText} ${val}`);
                    execute(val);
                }
                input.value = "";
            }
        });

        /* =========================================
           5. INTERPRÉTEUR DE COMMANDES
           ========================================= */
        function execute(line) {
            const parts = line.split(" ");
            const cmd = parts[0];
            const arg = parts[1];

            // Check Victoire
            if(levels[currentLvl].check(cmd, arg, null, currentUser, line)) {
                print(">>> ACTION VALIDÉE !", "success");
                if(currentLvl < levels.length - 1) setTimeout(() => initLevel(currentLvl + 1), 1000);
                else print("★ JEU TERMINÉ ! BRAVO ★", "success");
                return;
            }

            switch(cmd) {
                case 'help': print("ls, cd, cat, pwd, whoami, sudo, rm, mkdir, touch, ip, exit"); break;
                case 'clear': output.innerHTML = ""; break;
                case 'pwd': print(getPathString()); break;
                case 'whoami': print(currentUser); break;
                case 'exit': window.location.href = "/"; break;
                
                case 'sudo':
                    if(arg === "su") { currentUser = "root"; print("You are root.", "error"); updatePrompt(); }
                    else print("usage: sudo su");
                    break;

                case 'ls':
                    let contentObj;
                    if(currentPath.length === 0) contentObj = currentFs; 
                    else contentObj = resolvePath(currentPath);

                    if(!contentObj) { print("Error reading dir", "error"); break; }
                    let items = contentObj.children ? contentObj.children : contentObj;
                    
                    let out = "";
                    for(let k in items) {
                        if(k.startsWith(".") && !parts.includes("-a")) continue;
                        let type = items[k].type === 'file' ? 'file' : 'dir';
                        out += `<span class="${type}">${k}</span>  `;
                    }
                    print(out || "(vide)");
                    break;

                case 'cd':
                    if(!arg) { currentPath = ["home", "guest"]; } 
                    else if(arg === "/") { currentPath = []; }
                    else {
                        let targetPath = [...currentPath];
                        const segments = arg.split("/").filter(s => s !== "");
                        if(arg.startsWith("/")) targetPath = [];

                        let isValidMove = true;
                        for(let segment of segments) {
                            if(segment === "..") {
                                if(targetPath.length > 0) targetPath.pop();
                            } else if (segment === ".") {
                            } else {
                                let testPath = [...targetPath, segment];
                                let obj = resolvePath(testPath);
                                if(obj && (obj.type === 'dir' || !obj.type)) {
                                    if(obj.locked && currentUser !== "root") {
                                        print(`bash: cd: ${segment}: Permission denied`, "error");
                                        isValidMove = false; break;
                                    }
                                    targetPath.push(segment);
                                } else {
                                    print(`bash: cd: ${segment}: No such directory`, "error");
                                    isValidMove = false; break;
                                }
                            }
                        }
                        if(isValidMove) currentPath = targetPath;
                    }
                    updatePrompt();
                    break;

                case 'cat':
                    if(!arg) { print("usage: cat [file]"); break; }
                    let dirObj = currentPath.length === 0 ? currentFs : resolvePath(currentPath);
                    let files = dirObj.children ? dirObj.children : dirObj;
                    if(files[arg]) {
                        if(files[arg].type === 'dir') print(`cat: ${arg}: Is a directory`, "error");
                        else {
                            if(files[arg].locked && currentUser !== "root") print("cat: Permission denied", "error");
                            else print(files[arg].content);
                        }
                    } else print(`cat: ${arg}: No such file`, "error");
                    break;

                case 'rm': 
                case 'mkdir': 
                case 'touch':
                    if(!levels[currentLvl].check(cmd, arg)) print(""); 
                    break;
                
                case 'ip': print("eth0: 192.168.1.55/24"); break;
                case 'grep': print("grep: (standard input): binary file matches"); break;

                default: print(`bash: ${cmd}: command not found`, "error");
            }
        }
    </script>

    <!-- Matrix de fond -->
    <script>
    (function(){
        const c=document.getElementById('matrix-bg');
        if(!c)return;
        c.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.05;';
        const ctx=c.getContext('2d');
        const r=()=>{c.width=window.innerWidth;c.height=window.innerHeight;};
        r(); window.addEventListener('resize',r);
        const ch='01アイウエオカキクケコ'; const fs=14; let d=[];
        const init=()=>{d=[];for(let i=0;i<Math.floor(c.width/fs);i++)d[i]=Math.random()*-c.height/fs;};
        init(); window.addEventListener('resize',init);
        setInterval(()=>{
            ctx.fillStyle='rgba(2,12,27,0.08)';ctx.fillRect(0,0,c.width,c.height);
            ctx.fillStyle='#00f2ff';ctx.font=fs+'px Share Tech Mono,monospace';
            for(let i=0;i<d.length;i++){
                ctx.fillText(ch[Math.floor(Math.random()*ch.length)],i*fs,d[i]*fs);
                if(d[i]*fs>c.height&&Math.random()>0.975)d[i]=0;
                d[i]+=0.4;
            }
        },60);
    })();
    </script>
</body>
</html>
